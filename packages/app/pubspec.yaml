name: health_data_wallet
description: Patient wallet and researcher marketplace for the Health Data Monetization platform.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5
  dio: ^5.4.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  google_sign_in: ^7.0.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  local_auth: ^3.0.1
  local_auth_android: ^2.0.5
  image_picker: ^1.1.2
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/google_logo.png
