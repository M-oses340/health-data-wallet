name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: TypeScript API (Jest — 142 tests) ───────────────────────────────
  api:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm test --workspace=packages/api

      - name: Build API server
        run: npm run build --workspace=packages/api

  # ─── Job 2: Solidity contracts (Hardhat — 18 tests) ─────────────────────────
  contracts:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile
        working-directory: packages/contracts

      - name: Run contract tests
        run: npx hardhat test
        working-directory: packages/contracts

  # ─── Job 3: Python anonymizer (Pytest + Hypothesis — 23 tests) ──────────────
  anonymizer:
    name: Anonymizer Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: packages/anonymizer/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: packages/anonymizer

      - name: Download spaCy model
        run: python3 -m spacy download en_core_web_lg
        working-directory: packages/anonymizer

      - name: Run anonymizer tests
        run: python3 -m pytest tests/ -v
        working-directory: packages/anonymizer

  # ─── Job 4: Flutter app (unit + widget tests) ───────────────────────────────
  flutter:
    name: Flutter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: stable

      - name: Install dependencies
        run: flutter pub get
        working-directory: packages/app

      - name: Analyze
        run: flutter analyze
        working-directory: packages/app

      - name: Run tests
        run: flutter test
        working-directory: packages/app

  # ─── Job 5: Docker Compose build + smoke test ──────────────────────────────
  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/health && echo "API healthy" && exit 0
            echo "Waiting... ($i/30)"
            sleep 5
          done
          echo "API never became healthy" && exit 1

      - name: Smoke test — register + upload + marketplace
        run: |
          PATIENT=$(curl -sf -X POST http://localhost:3000/auth/register)
          DID=$(echo $PATIENT | grep -o '"did":"[^"]*"' | cut -d'"' -f4)
          TOKEN=$(echo $PATIENT | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          DATA=$(echo -n '{"heartRate":72}' | base64)
          curl -sf -X POST http://localhost:3000/vault/upload \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d "{\"patientDID\":\"$DID\",\"data\":\"$DATA\",\"dataType\":\"HEALTH_METRICS\",\"category\":\"vitals\"}"
          curl -sf "http://localhost:3000/marketplace/datasets" | grep -q "listingId"
          curl -sf http://localhost:5001/health | grep -q "ok"
          curl -sf -X POST http://localhost:8545 \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' | grep -q "result"
          echo "All smoke tests passed"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

  # ─── Job 6: Flower FL server (Pytest — 14 tests) ────────────────────────────
  fl_server:
    name: FL Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: packages/fl-server/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
          pip install -e .
        working-directory: packages/fl-server

      - name: Run FL server tests
        run: python3 -m pytest tests/ -v
        working-directory: packages/fl-server
