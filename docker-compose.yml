services:
  # ── Local Hardhat blockchain node ─────────────────────────────────────────
  hardhat:
    build:
      context: .
      dockerfile: packages/contracts/Dockerfile
    ports:
      - "8545:8545"
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "http://localhost:8545", "-H", "Content-Type: application/json", "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}"]
      interval: 5s
      timeout: 3s
      retries: 15

  # ── Python FL server + anonymizer sidecar ────────────────────────────────
  fl-server:
    build:
      context: .
      dockerfile: packages/fl-server/Dockerfile
    ports:
      - "5001:5001"
    security_opt:
      - seccomp:unconfined
    environment:
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5001/health"]
      interval: 5s
      timeout: 3s
      retries: 15

  # ── Node.js API server ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    security_opt:
      - seccomp:unconfined
    ports:
      - "3000:3000"
    volumes:
      - api_data:/app/data
      - ./packages/contracts/deployed-addresses.json:/app/deployed-addresses.json:ro
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
      - FL_SERVER_URL=http://fl-server:5001
      - BLOCKCHAIN_RPC_URL=http://hardhat:8545
      - DB_PATH=/app/data/platform.db
    depends_on:
      fl-server:
        condition: service_healthy
      hardhat:
        condition: service_healthy
      contracts-deploy:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  # ── Deploy contracts to Hardhat ───────────────────────────────────────────
  contracts-deploy:
    build:
      context: .
      dockerfile: packages/contracts/Dockerfile
    network_mode: host
    security_opt:
      - seccomp:unconfined
    command: sh -c "echo 'Waiting for hardhat RPC...'; until nc -z localhost 8545; do echo 'RPC not ready, retrying in 2s...'; sleep 2; done; echo 'RPC ready, deploying...'; sleep 2; npx hardhat run scripts/deploy.js --network localhost --config hardhat.config.js --no-compile && cp deployed-addresses.json /addresses/deployed-addresses.json"
    working_dir: /app/packages/contracts
    volumes:
      - ./packages/contracts:/addresses
      - ./.hardhat-cache/compilers-v3/wasm:/root/.cache/hardhat-nodejs/compilers-v3/wasm:ro
    environment:
      - HARDHAT_NETWORK=localhost
      - HARDHAT_RPC_URL=http://localhost:8545
    depends_on:
      hardhat:
        condition: service_healthy
    restart: "no"

volumes:
  api_data:
